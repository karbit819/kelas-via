<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelas VIA</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}

.section {
  padding: 60px 20px;
}

img {
  width: 140px;
  height: 140px;
  object-fit: cover;
  border-radius: 50%;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  width: 120px;
}

.gallery img {
  width: 200px;
  height: 140px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="section">
  <img src="LINK_FOTO_KELAS">
  <h1>KELAS VIA</h1>
  <p>Solid, Kompak, Penuh Kenangan 💙</p>
</div>

<div class="section">
  <h2>Siapa Kami?</h2>
  <p>Kami adalah siswa kelas VIA yang penuh kebersamaan dan kenangan.</p>
</div>

<div class="section">
  <h2>Struktur Kelas</h2>
  <div class="grid">
    <div class="card">
      <img src="LINK_KETUA">
      <p>Ketua</p>
    </div>
    <div class="card">
      <img src="LINK_WAKIL">
      <p>Wakil</p>
    </div>
  </div>
</div>

<div class="section">
  <h2>Anggota</h2>
  <div class="grid">
    <div class="card">
      <img src="LINK_ORANG1">
      <p>Nama Panjang</p>
    </div>
  </div>
</div>

<div class="section">
  <h2>Prestasi</h2>
  <div class="grid">
    <div class="card">
      <img src="LINK_PRESTASI">
      <p>Juara 1 🥇</p>
    </div>
  </div>
</div>

<div class="section">
  <h2>Kenangan</h2>
  <div class="grid gallery">
    <img src="LINK_KENANGAN1">
    <img src="LINK_KENANGAN2">
  </div>
</div>

<div class="section">
  <p>“Kenangan tidak akan hilang, Kelas VIA selamanya ❤️”</p>
</div>

</body>
</html>
