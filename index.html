<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelas VIA</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

:root {
  --bg: #020617;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --text: #e2e8f0;
  --accent: #38bdf8;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 20% 20%, rgba(56,189,248,0.08), transparent 40%),
    radial-gradient(circle at 80% 0%, rgba(99,102,241,0.08), transparent 40%),
    var(--bg);
}

.section {
  padding: 80px 20px;
  max-width: 1100px;
  margin: auto;
  text-align: center;
}

h1 {
  font-size: 2.8rem;
}

h2 {
  font-size: 1.8rem;
  margin-bottom: 30px;
}

h2::after {
  content: "";
  width: 50px;
  height: 3px;
  background: var(--accent);
  display: block;
  margin: 10px auto;
  border-radius: 10px;
}

.section > img {
  width: 170px;
  height: 170px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  box-shadow: 0 0 30px rgba(56,189,248,0.2);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 20px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
}

.card img {
  width: 100%;
  aspect-ratio: 1/1;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 10px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 12px;
}

p {
  color: #cbd5e1;
}
</style>

</head>
<body>

<div class="section">
  <img src="https://i.imgur.com/REPLACE.jpg">
  <!-- GANTI dengan direct link foto kelas -->
  <h1>KELAS VIA</h1>
  <p>Solid, Kompak, Penuh Kenangan 💙</p>
</div>

<div class="section">
  <h2>Siapa Kami?</h2>
  <p>Kami adalah siswa kelas VIA yang penuh kebersamaan dan kenangan.</p>
</div>

<div class="section">
  <h2>Struktur Kelas</h2>
  <div class="grid">
    <div class="card">
      <img src="https://i.imgur.com/REPLACE.jpg">
      <p>M.Kinan Aftadithya Naufaldy</p>
    </div>
    <div class="card">
      <img src="https://i.imgur.com/REPLACE.jpg">
      <p>Muhammad Noval</p>
    </div>
  </div>
</div>

<div class="section">
  <h2>Anggota</h2>
  <div class="grid">
